name: release

# Publishes the package to npm whenever a version tag (v*.*.*) is pushed.
# Workflow:
#   1. bump locally: `npm run release:patch|minor|major`
#      (this runs `npm version <bump>`, which writes package.json,
#       runs the `version` lifecycle hook to sync src/version.js,
#       creates a git tag and commit)
#   2. push: `git push --follow-tags`
#   3. this workflow runs, publishes to npm, and creates a GitHub Release.

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'    # prereleases, e.g. v0.2.0-rc.1

permissions:
  contents: read      # default; jobs override as needed

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC trusted publishing
      contents: write   # required to create the GitHub Release
    steps:
      - name: Check out tag
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (≥11.5.1 required for OIDC)
        run: npm install -g npm@latest

      - name: Verify tag matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag:     $TAG_VERSION"
          echo "Package: $PKG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Inspect tarball contents
        run: npm pack --dry-run

      - name: Publish to npm (stable)
        if: "!contains(github.ref_name, '-')"
        run: npm publish --access public
        # No NODE_AUTH_TOKEN needed — provenance is automatic via OIDC

      - name: Publish to npm (prerelease)
        if: "contains(github.ref_name, '-')"
        run: npm publish --access public --tag next

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}