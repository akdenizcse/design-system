<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>Akdeniz Üniversitesi · Portal — UI kit</title>
<link rel="stylesheet" href="portal.css">
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="SideNav.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel">
function App() {
  const [signedIn, setSignedIn] = React.useState(true);
  const [route, setRoute] = React.useState('overview');
  const sideToHeader = { overview: 'home', calendar: 'home', inbox: 'home',
    courses: 'courses', grades: 'courses', transcript: 'docs',
    requests: 'records', finance: 'finance', settings: 'home' };
  const headerActive = sideToHeader[route] || 'home';

  React.useEffect(() => { lucide.createIcons(); });

  if (!signedIn) {
    return <LoginScreen onLogin={() => setSignedIn(true)} />;
  }

  let screen;
  switch (route) {
    case 'courses':    screen = <CoursesScreen />; break;
    case 'transcript': screen = <TranscriptScreen onSubmit={() => {}} />; break;
    default:           screen = <DashboardScreen />;
  }

  return (
    <div className="shell">
      <PortalHeader active={headerActive} onNav={(id) => {
        const map = { home: 'overview', courses: 'courses', records: 'requests', finance: 'finance', docs: 'transcript' };
        setRoute(map[id] || 'overview');
      }} />
      <SideNav active={route} onNav={setRoute} />
      <main className="shell__main">
        <div className="shell__body">{screen}</div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
