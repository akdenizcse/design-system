<!doctype html><html><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="_card.css"></head><body>
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;font-family:'Gotham Narrow',sans-serif">
  <div style="text-align:center"><div style="width:88px;height:88px;background:#EAF1F9;border:1px solid #D4E4F4;border-radius:4px;margin:0 auto 8px"></div><div style="font-weight:600;font-size:12px;color:#0E1A33">sm</div><div style="font-family:ui-monospace;font-size:11px;color:#6B7591">4px</div></div>
  <div style="text-align:center"><div style="width:88px;height:88px;background:#EAF1F9;border:1px solid #D4E4F4;border-radius:8px;margin:0 auto 8px"></div><div style="font-weight:600;font-size:12px;color:#0E1A33">md</div><div style="font-family:ui-monospace;font-size:11px;color:#6B7591">8px</div></div>
  <div style="text-align:center"><div style="width:88px;height:88px;background:#EAF1F9;border:1px solid #D4E4F4;border-radius:12px;margin:0 auto 8px"></div><div style="font-weight:600;font-size:12px;color:#0E1A33">lg</div><div style="font-family:ui-monospace;font-size:11px;color:#6B7591">12px</div></div>
  <div style="text-align:center"><div style="width:88px;height:88px;background:#EAF1F9;border:1px solid #D4E4F4;border-radius:16px;margin:0 auto 8px"></div><div style="font-weight:600;font-size:12px;color:#0E1A33">xl</div><div style="font-family:ui-monospace;font-size:11px;color:#6B7591">16px</div></div>
  <div style="text-align:center"><div style="width:88px;height:88px;background:#EAF1F9;border:1px solid #D4E4F4;border-radius:999px;margin:0 auto 8px"></div><div style="font-weight:600;font-size:12px;color:#0E1A33">full</div><div style="font-family:ui-monospace;font-size:11px;color:#6B7591">999px</div></div>
</div>
</body></html>
