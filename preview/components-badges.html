<!doctype html><html><head><meta charset="utf-8"><title>Badges</title><link rel="stylesheet" href="../colors_and_type.css"></head><body style="margin:0;padding:24px;background:#fff;width:700px;font-family:'Gotham Narrow',sans-serif">
<style>
  .badge{display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;font-size:12px;font-weight:600;border-radius:4px;line-height:1}
  .dot{width:6px;height:6px;border-radius:50%}
</style>
<div style="display:flex;flex-direction:column;gap:18px">
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <span class="badge" style="background:#E2F2EA;color:#2E8B57"><span class="dot" style="background:#2E8B57"></span>Aktif</span>
    <span class="badge" style="background:#FBEFD0;color:#C98A12"><span class="dot" style="background:#C98A12"></span>Beklemede</span>
    <span class="badge" style="background:#F9E3E1;color:#C9342C"><span class="dot" style="background:#C9342C"></span>Reddedildi</span>
    <span class="badge" style="background:#EAF1F9;color:#0063AA"><span class="dot" style="background:#0063AA"></span>Yeni</span>
    <span class="badge" style="background:#E8EBF1;color:#4B5673">Taslak</span>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <span class="badge" style="background:#1D366A;color:#fff">CS 101</span>
    <span class="badge" style="background:#0063AA;color:#fff">5 ECTS</span>
    <span class="badge" style="background:#F47524;color:#fff">Yeni başvuru</span>
    <span class="badge" style="background:#fff;border:1px solid rgba(29,54,106,.16);color:#1D366A">Güz 2026</span>
    <span class="badge" style="background:#fff;border:1px solid rgba(29,54,106,.16);color:#1D366A">Lisans</span>
  </div>
</div>
</body></html>
