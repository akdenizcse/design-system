<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="_card.css"></head><body style="background:#F7F8FC;padding:32px 24px">
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px;font-family:'Gotham Narrow',sans-serif">
  <div style="text-align:center">
    <div style="width:120px;height:80px;background:#fff;border-radius:12px;margin:0 auto 16px;box-shadow:0 1px 2px rgba(15,38,85,0.04),0 1px 1px rgba(15,38,85,0.04)"></div>
    <div style="font-weight:600;font-size:12px;color:#0E1A33">shadow-1</div>
    <div style="font-size:11px;color:#6B7591;margin-top:2px">resting cards</div>
  </div>
  <div style="text-align:center">
    <div style="width:120px;height:80px;background:#fff;border-radius:12px;margin:0 auto 16px;box-shadow:0 6px 16px rgba(15,38,85,0.10),0 2px 4px rgba(15,38,85,0.06)"></div>
    <div style="font-weight:600;font-size:12px;color:#0E1A33">shadow-2</div>
    <div style="font-size:11px;color:#6B7591;margin-top:2px">popovers, menus</div>
  </div>
  <div style="text-align:center">
    <div style="width:120px;height:80px;background:#fff;border-radius:12px;margin:0 auto 16px;box-shadow:0 16px 40px rgba(15,38,85,0.18),0 4px 8px rgba(15,38,85,0.08)"></div>
    <div style="font-weight:600;font-size:12px;color:#0E1A33">shadow-3</div>
    <div style="font-size:11px;color:#6B7591;margin-top:2px">modals</div>
  </div>
</div>
</body></html>
