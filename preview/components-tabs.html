<!doctype html><html><head><meta charset="utf-8"><title>Tabs &amp; menu</title><link rel="stylesheet" href="../colors_and_type.css"></head><body style="margin:0;padding:24px;background:#fff;width:700px;font-family:'Gotham Narrow',sans-serif">
<div style="display:flex;flex-direction:column;gap:18px">
  <div>
    <div style="font-size:11px;font-weight:500;color:#6B7591;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Tabs</div>
    <div style="display:flex;gap:6px;border-bottom:1px solid rgba(29,54,106,.08)">
      <div style="padding:10px 14px;font-weight:700;font-size:13px;color:#1D366A;border-bottom:2px solid #F47524;margin-bottom:-1px">Genel</div>
      <div style="padding:10px 14px;font-weight:500;font-size:13px;color:#4B5673">Dersler</div>
      <div style="padding:10px 14px;font-weight:500;font-size:13px;color:#4B5673">Notlar</div>
      <div style="padding:10px 14px;font-weight:500;font-size:13px;color:#4B5673">Mali işler</div>
      <div style="padding:10px 14px;font-weight:500;font-size:13px;color:#4B5673">Belgeler</div>
    </div>
  </div>
  <div>
    <div style="font-size:11px;font-weight:500;color:#6B7591;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Segmented</div>
    <div style="display:inline-flex;background:#F2F4F8;border-radius:8px;padding:3px;gap:0">
      <div style="padding:6px 14px;font-weight:600;font-size:13px;color:#1D366A;background:#fff;border-radius:6px;box-shadow:0 1px 2px rgba(15,38,85,.06)">Bu hafta</div>
      <div style="padding:6px 14px;font-weight:500;font-size:13px;color:#6B7591">Bu ay</div>
      <div style="padding:6px 14px;font-weight:500;font-size:13px;color:#6B7591">Yıl</div>
    </div>
  </div>
  <div>
    <div style="font-size:11px;font-weight:500;color:#6B7591;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Menu</div>
    <div style="background:#fff;border:1px solid rgba(29,54,106,.08);border-radius:8px;box-shadow:0 6px 16px rgba(15,38,85,.10),0 2px 4px rgba(15,38,85,.06);width:240px;padding:6px">
      <div style="padding:8px 10px;border-radius:6px;font-size:13px;color:#0E1A33;display:flex;justify-content:space-between"><span>Profilim</span><span style="color:#6B7591;font-size:12px">⌘P</span></div>
      <div style="padding:8px 10px;border-radius:6px;font-size:13px;color:#fff;background:#0063AA;display:flex;justify-content:space-between"><span>Belgelerim</span><span style="color:rgba(255,255,255,.7);font-size:12px">⌘D</span></div>
      <div style="padding:8px 10px;border-radius:6px;font-size:13px;color:#0E1A33;display:flex;justify-content:space-between"><span>Ayarlar</span><span style="color:#6B7591;font-size:12px">⌘,</span></div>
      <div style="height:1px;background:rgba(29,54,106,.08);margin:4px 6px"></div>
      <div style="padding:8px 10px;border-radius:6px;font-size:13px;color:#C9342C">Çıkış yap</div>
    </div>
  </div>
</div>
</body></html>
