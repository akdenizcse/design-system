<!doctype html><html><head><meta charset="utf-8"><title>Brand colors</title><link rel="stylesheet" href="_card.css"></head><body>
<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">

    <div class="chip" style="background:#1D366A;"></div>
    <div class="name">Deep Blue</div>
    <div class="hex">#1D366A · --blue-800</div>

  <div class="swatch">
    <div class="chip" style="background:#0063AA;"></div>

    <div class="hex">#0063AA · --blue-600</div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#F47524;"></div>
    <div class="name">Sun Orange</div>
    <div class="hex">#F47524 · --orange-600</div>
  </div>
</div>
</body></html>
