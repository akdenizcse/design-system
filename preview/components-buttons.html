<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="../colors_and_type.css"></head><body style="margin:0;padding:24px;background:#fff;width:700px;font-family:'Gotham Narrow',sans-serif">
<style>
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 18px;height:40px;border-radius:8px;font-family:inherit;font-weight:700;font-size:14px;border:1px solid transparent;cursor:pointer;transition:all 120ms cubic-bezier(.2,0,0,1)}
  .btn-primary{background:#0063AA;color:#fff}
  .btn-primary:hover{background:#004C84}
  .btn-secondary{background:#fff;color:#0063AA;border-color:rgba(29,54,106,0.16)}
  .btn-secondary:hover{border-color:#0063AA}
  .btn-ghost{background:transparent;color:#0063AA}
  .btn-ghost:hover{background:#EAF1F9}
  .btn-accent{background:#F47524;color:#fff}
  .btn-accent:hover{background:#C75712}
  .btn-danger{background:#fff;color:#C9342C;border-color:rgba(201,52,44,0.3)}
  .btn-sm{height:32px;padding:0 12px;font-size:13px}
  .btn-lg{height:48px;padding:0 22px;font-size:15px}
  .lbl{font-size:11px;font-weight:500;color:#6B7591;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
</style>
<div style="display:flex;flex-direction:column;gap:18px">
  <div>
    <div class="lbl">Variants</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-primary">Primary action</button>
      <button class="btn btn-secondary">Secondary</button>
      <button class="btn btn-ghost">Ghost</button>
      <button class="btn btn-accent">Accent</button>
      <button class="btn btn-danger">Sil</button>
    </div>
  </div>
  <div>
    <div class="lbl">Sizes</div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn btn-primary btn-sm">Small</button>
      <button class="btn btn-primary">Default</button>
      <button class="btn btn-primary btn-lg">Large</button>
    </div>
  </div>
</div>
</body></html>
