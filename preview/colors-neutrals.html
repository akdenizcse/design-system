<!doctype html><html><head><meta charset="utf-8"><title>Neutral ramp</title><link rel="stylesheet" href="_card.css"></head><body>
<div style="display:grid; grid-template-columns: repeat(11, 1fr); gap: 5px;">
  <div class="swatch"><div class="chip" style="background:#FFFFFF;height:60px;border:1px solid #E8EBF1"></div><div class="hex">paper</div></div>
  <div class="swatch"><div class="chip" style="background:#F7F8FC;height:60px;border:1px solid #E8EBF1"></div><div class="hex">canvas</div></div>
  <div class="swatch"><div class="chip" style="background:#F2F4F8;height:60px"></div><div class="hex">050</div></div>
  <div class="swatch"><div class="chip" style="background:#E8EBF1;height:60px"></div><div class="hex">100</div></div>
  <div class="swatch"><div class="chip" style="background:#D6DBE5;height:60px"></div><div class="hex">200</div></div>
  <div class="swatch"><div class="chip" style="background:#B4BCCC;height:60px"></div><div class="hex">300</div></div>
  <div class="swatch"><div class="chip" style="background:#8E97AE;height:60px"></div><div class="hex">400</div></div>
  <div class="swatch"><div class="chip" style="background:#6B7591;height:60px"></div><div class="hex">500</div></div>
  <div class="swatch"><div class="chip" style="background:#4B5673;height:60px"></div><div class="hex">600</div></div>
  <div class="swatch"><div class="chip" style="background:#2A3654;height:60px"></div><div class="hex" style="color:#fff;background:#2A3654;border-radius:4px;text-align:center;padding:1px 0">700</div></div>
  <div class="swatch"><div class="chip" style="background:#0E1A33;height:60px"></div><div class="hex" style="color:#fff;background:#0E1A33;border-radius:4px;text-align:center;padding:1px 0">900</div></div>
</div>
<div style="font-size:11px;color:#6B7591;margin-top:10px;font-family:'Gotham Narrow',sans-serif">Cool, blue-tinted neutrals · canvas = page bg · 900 = body text</div>
</body></html>
