<!doctype html><html><head><meta charset="utf-8"><title>Semantic colors</title><link rel="stylesheet" href="_card.css"></head><body>
<div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
  <div style="border-radius:8px;border:1px solid #E8EBF1;overflow:hidden">
    <div style="background:#E2F2EA;color:#2E8B57;padding:10px 12px;font-weight:700;font-size:13px;font-family:'Gotham Narrow',sans-serif">Success</div>
    <div style="padding:10px 12px;font-size:11px;color:#6B7591;font-family:'Gotham Narrow',sans-serif"><div style="font-family:ui-monospace">#2E8B57</div><div style="font-family:ui-monospace">#E2F2EA</div></div>
  </div>
  <div style="border-radius:8px;border:1px solid #E8EBF1;overflow:hidden">
    <div style="background:#FBEFD0;color:#C98A12;padding:10px 12px;font-weight:700;font-size:13px;font-family:'Gotham Narrow',sans-serif">Warning</div>
    <div style="padding:10px 12px;font-size:11px;color:#6B7591;font-family:'Gotham Narrow',sans-serif"><div style="font-family:ui-monospace">#C98A12</div><div style="font-family:ui-monospace">#FBEFD0</div></div>
  </div>
  <div style="border-radius:8px;border:1px solid #E8EBF1;overflow:hidden">
    <div style="background:#F9E3E1;color:#C9342C;padding:10px 12px;font-weight:700;font-size:13px;font-family:'Gotham Narrow',sans-serif">Danger</div>
    <div style="padding:10px 12px;font-size:11px;color:#6B7591;font-family:'Gotham Narrow',sans-serif"><div style="font-family:ui-monospace">#C9342C</div><div style="font-family:ui-monospace">#F9E3E1</div></div>
  </div>
  <div style="border-radius:8px;border:1px solid #E8EBF1;overflow:hidden">
    <div style="background:#EAF1F9;color:#0063AA;padding:10px 12px;font-weight:700;font-size:13px;font-family:'Gotham Narrow',sans-serif">Info</div>
    <div style="padding:10px 12px;font-size:11px;color:#6B7591;font-family:'Gotham Narrow',sans-serif"><div style="font-family:ui-monospace">#0063AA</div><div style="font-family:ui-monospace">#EAF1F9</div></div>
  </div>
</div>
</body></html>
