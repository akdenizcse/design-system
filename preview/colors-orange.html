<!doctype html><html><head><meta charset="utf-8"><title>Orange ramp</title><link rel="stylesheet" href="_card.css"></head><body>
<div style="display:grid; grid-template-columns: repeat(7, 1fr); gap: 6px;">
  <div class="swatch"><div class="chip" style="background:#FEF6EE;height:60px"></div><div class="hex">050</div></div>
  <div class="swatch"><div class="chip" style="background:#FDEAD6;height:60px"></div><div class="hex">100</div></div>
  <div class="swatch"><div class="chip" style="background:#FDCBA8;height:60px"></div><div class="hex">300</div></div>
  <div class="swatch"><div class="chip" style="background:#FBAD78;height:60px"></div><div class="hex">400</div></div>
  <div class="swatch"><div class="chip" style="background:#F88E4A;height:60px"></div><div class="hex">500</div></div>
  <div class="swatch"><div class="chip" style="background:#F47524;height:60px"></div><div class="hex" style="color:#fff;background:#F47524;border-radius:4px;text-align:center;padding:1px 0">600</div></div>
  <div class="swatch"><div class="chip" style="background:#C75712;height:60px"></div><div class="hex">700</div></div>
</div>
<div style="font-size:11px;color:#6B7591;margin-top:10px;font-family:'Gotham Narrow',sans-serif">Sun-orange ramp · 600 is the brand accent · use as punctuation, not paragraph</div>
</body></html>
