<!doctype html><html><head><meta charset="utf-8"><title>Blue ramp</title><link rel="stylesheet" href="_card.css"></head><body>
<div style="display:grid; grid-template-columns: repeat(10, 1fr); gap: 6px;">
  <div class="swatch"><div class="chip" style="background:#F2F6FB;height:60px"></div><div class="hex">050</div></div>
  <div class="swatch"><div class="chip" style="background:#EAF1F9;height:60px"></div><div class="hex">100</div></div>
  <div class="swatch"><div class="chip" style="background:#D4E4F4;height:60px"></div><div class="hex">200</div></div>
  <div class="swatch"><div class="chip" style="background:#A6CCEA;height:60px"></div><div class="hex">300</div></div>
  <div class="swatch"><div class="chip" style="background:#66A8DA;height:60px"></div><div class="hex">400</div></div>
  <div class="swatch"><div class="chip" style="background:#2A86C7;height:60px"></div><div class="hex">500</div></div>
  <div class="swatch"><div class="chip" style="background:#0063AA;height:60px"></div><div class="hex" style="color:#fff;background:#0063AA;border-radius:4px;text-align:center;padding:1px 0">600</div></div>
  <div class="swatch"><div class="chip" style="background:#004C84;height:60px"></div><div class="hex">700</div></div>
  <div class="swatch"><div class="chip" style="background:#1D366A;height:60px"></div><div class="hex" style="color:#fff;background:#1D366A;border-radius:4px;text-align:center;padding:1px 0">800</div></div>
  <div class="swatch"><div class="chip" style="background:#0F2655;height:60px"></div><div class="hex">900</div></div>
</div>
<div style="font-size:11px;color:#6B7591;margin-top:10px;font-family:'Gotham Narrow',sans-serif">Blue ramp · 600 = links · 800 = primary identity · 900 = footer</div>
</body></html>
